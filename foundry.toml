[profile.default]
src = 'contracts'
out = 'out'
libs = ['lib']
auto_detect_solc = true
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = 'none'

[rpc_endpoints]
# Optional. Set `BASE_RPC_URL=...` if you want forge to expose a `base` alias.
# Fork tests read `BASE_RPC_URL` directly via `vm.envOr` and fall back to the
# public Base RPC, so this section isn't strictly required.
base = "${BASE_RPC_URL}"
